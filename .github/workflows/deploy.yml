name: CI/CD - Build & Deploy to AWS EC2 (Nginx + Docker)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Docker Image & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/college_information_port:latest

  deploy:
    name: Deploy to AWS EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/college_information_port/nginx
            
            # Create docker-compose.yml
            cat > ~/college_information_port/docker-compose.yml << 'EOF'
            version: "3.8"
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/college_information_port:latest
                container_name: college-app
                restart: unless-stopped
                expose:
                  - "3000"
                networks:
                  - webnet
              nginx:
                image: nginx:alpine
                container_name: college-nginx
                restart: unless-stopped
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - app
                networks:
                  - webnet
            networks:
              webnet:
                driver: bridge
            EOF
            
            # Create nginx.conf
            cat > ~/college_information_port/nginx/nginx.conf << 'NGINXEOF'
            server {
                listen 80;
                location / {
                    proxy_pass         http://app:3000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection 'upgrade';
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINXEOF
            
            # Pull image and restart containers
            docker pull ${{ secrets.DOCKER_USERNAME }}/college_information_port:latest
            cd ~/college_information_port
            
            # Export variable so docker compose uses the right image
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            
            docker compose down || true
            docker compose up -d
            docker image prune -f
            echo "Deployment complete!"

version: "3.8"
services:
  app:
    image: ${DOCKER_USERNAME}/college_information_port:latest
    container_name: college-app
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - webnet
  nginx:
    image: nginx:alpine
    container_name: college-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - webnet
networks:
  webnet:
    driver: bridge
